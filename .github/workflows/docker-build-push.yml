# Docker Hub image: ${DOCKER_USERNAME}/sign-fashion
#
# GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   DOCKER_USERNAME    Docker Hub username
#   DOCKER_PASSWORD    Docker Hub access token (not account password)
#   NEXT_PUBLIC_SITE_URL
#   NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME   optional
#   NEXT_PUBLIC_INSTAGRAM_URL             optional
#
# Deploy (EC2):
#   EC2_HOST      host or IP
#   EC2_USER      SSH user (e.g. ubuntu, ec2-user)
#   EC2_SSH_KEY   private key (full PEM, paste as secret)
#
# On the EC2 host: clone this repo (or copy docker-compose.yml), create ~/sign-fashion/.env with
# SIGN_FASHION_IMAGE=<DOCKER_USERNAME>/sign-fashion:latest
# plus runtime vars: MONGODB_URI, ADMIN_SESSION_TOKEN, CLOUDINARY_* , etc.

name: Docker Build and Push

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: sign-fashion

permissions:
  contents: read
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            NEXT_PUBLIC_INSTAGRAM_URL=${{ secrets.NEXT_PUBLIC_INSTAGRAM_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd ~/sign-fashion
            docker compose pull
            docker compose up -d --no-deps --force-recreate
            docker image prune -f
            docker ps
