# Build & push to Docker Hub: iamcyberster/sign-fashion (IMAGE_NAME must match repo name).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   DOCKER_USERNAME   e.g. iamcyberster
#   DOCKER_PASSWORD   Hub access token
#   NEXT_PUBLIC_SITE_URL
#   NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME   (optional)
#   NEXT_PUBLIC_INSTAGRAM_URL            (optional)
#
# Step 2 (later): add deploy job + docker-compose + EC2.

name: Docker build and push

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: sign-fashion

permissions:
  contents: read
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            NEXT_PUBLIC_INSTAGRAM_URL=${{ secrets.NEXT_PUBLIC_INSTAGRAM_URL }}
